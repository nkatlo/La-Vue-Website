<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&amp;family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&amp;family=Montserrat:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <link href="./output.css" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ivory: '#FAF8F5',
              charcoal: '#1A1A1A',
              warmgrey: '#A89F94',
              champagne: '#C9A96E',
              navy: '#1B2A4A',
            }
          }
        }
      }
    </script>
    <style>
      html { height: 100%; }
      body { height: 100%; margin: 0; }

      .font-serif-display { font-family: 'Playfair Display', Georgia, serif; }
      .font-serif-body { font-family: 'Cormorant Garamond', Georgia, serif; }
      .font-sans-body { font-family: 'Montserrat', Arial, sans-serif; }

      .app-root {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        scroll-behavior: smooth;
      }

      /* Animations */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes lineGrow {
        from { height: 0; }
        to { height: 80px; }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideLeft {
        from { opacity: 0; transform: translateX(40px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes subtleFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes dividerGrow {
        from { width: 0; opacity: 0; }
        to { width: 60px; opacity: 1; }
      }

      .anim-fade-up {
        opacity: 0;
        animation: fadeUp 1s ease-out forwards;
      }
      .anim-fade-in {
        opacity: 0;
        animation: fadeIn 1.2s ease-out forwards;
      }
      .anim-line {
        animation: lineGrow 1.2s ease-out 0.5s forwards;
        height: 0;
      }
      .anim-divider {
        animation: dividerGrow 0.8s ease-out forwards;
        width: 0;
      }
      .anim-delay-1 { animation-delay: 0.2s; }
      .anim-delay-2 { animation-delay: 0.4s; }
      .anim-delay-3 { animation-delay: 0.6s; }
      .anim-delay-4 { animation-delay: 0.8s; }
      .anim-delay-5 { animation-delay: 1.0s; }
      .anim-delay-6 { animation-delay: 1.2s; }

      /* Scroll reveal */
      .reveal {
        opacity: 0;
        transform: translateY(24px);
        transition: opacity 0.8s ease, transform 0.8s ease;
      }
      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* Thin divider — animated */
      .thin-divider {
        width: 60px;
        height: 1px;
        background: #C9A96E;
        margin: 0 auto;
        animation: dividerGrow 0.8s ease-out forwards;
      }

      /* Section divider lines with soft styling */
      .section-divider {
        height: 1px;
        background: rgba(168, 159, 148, 0.2);
        animation: subtleFadeIn 1s ease-out;
      }

      /* Gallery grid */
      .gallery-item {
        position: relative;
        overflow: hidden;
        border-radius: 2px;
      }
      .gallery-item .gallery-overlay {
        position: absolute;
        inset: 0;
        background: rgba(27,42,74,0.0);
        transition: background 0.5s ease;
      }
      .gallery-item:hover .gallery-overlay {
        background: rgba(27,42,74,0.2);
      }
      .gallery-svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* Minimalist gallery styling */
      .gallery-item-minimal {
        position: relative;
        background: #FAF8F5;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .gallery-item-minimal svg {
        width: 100%;
        height: 100%;
        display: block;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), filter 0.8s ease;
      }
      .gallery-item-minimal:hover svg {
        transform: scale(1.04);
        filter: brightness(1.08);
      }
      .gallery-item-minimal .gallery-overlay-minimal {
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(201,169,110,0) 0%, rgba(201,169,110,0.02) 50%, rgba(201,169,110,0) 100%);
        opacity: 0;
        transition: opacity 0.6s ease;
      }
      .gallery-item-minimal:hover .gallery-overlay-minimal {
        opacity: 1;
      }
      .gallery-item-minimal:hover {
        transform: translateY(-8px);
        box-shadow: 0 24px 48px rgba(0,0,0,0.1), 0 8px 16px rgba(0,0,0,0.06);
      }

      /* Testimonial */
      .quote-mark {
        font-family: 'Playfair Display', serif;
        font-size: 72px;
        line-height: 1;
        color: #C9A96E;
        opacity: 0.4;
      }

      /* Nav */
      .nav-link {
        position: relative;
        padding-bottom: 2px;
      }
      .nav-link::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 1px;
        background: #C9A96E;
        transition: width 0.3s ease;
      }
      .nav-link:hover::after {
        width: 100%;
      }

      /* Form styling */
      .form-input {
        background: transparent;
        border: none;
        border-bottom: 1px solid #A89F94;
        padding: 12px 0;
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 300;
        color: #1A1A1A;
        outline: none;
        transition: border-color 0.3s ease;
        width: 100%;
      }
      .form-input:focus {
        border-bottom-color: #C9A96E;
      }
      .form-input::placeholder {
        color: #A89F94;
      }

      /* Feature card */
      .feature-card {
        border: 1px solid rgba(168,159,148,0.25);
        transition: border-color 0.4s ease, transform 0.4s ease;
      }
      .feature-card:hover {
        border-color: #C9A96E;
        transform: translateY(-4px);
      }

      /* Luxury Feature Card */
      .luxury-feature-card {
        border: 1px solid rgba(201,169,110,0.15);
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.02);
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }
      .luxury-feature-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(201,169,110,0.05), transparent);
        transition: left 0.8s ease;
      }
      .luxury-feature-card:hover {
        border-color: rgba(201,169,110,0.35);
        box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
        transform: translateY(-6px);
      }
      .luxury-feature-card:hover::before {
        left: 100%;
      }

      /* Smooth scrollbar */
      .app-root::-webkit-scrollbar { width: 6px; }
      .app-root::-webkit-scrollbar-track { background: #FAF8F5; }
      .app-root::-webkit-scrollbar-thumb { background: #C9A96E; border-radius: 3px; }

      /* Mobile nav */
      .mobile-nav {
        position: fixed;
        top: 0;
        right: -100%;
        width: 100%;
        height: 100%;
        background: #FAF8F5;
        z-index: 60;
        transition: right 0.4s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .mobile-nav.open { right: 0; }

      /* Testimonial carousel */
      .testimonial-track {
        display: flex;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
    </style>
    <style>body { box-sizing: border-box; }</style>
