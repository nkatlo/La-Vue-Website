<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/src/images/favicon.png">
    <title>La Vue Port Shepstone</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&amp;family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&amp;family=Montserrat:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <link href="./output.css" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ivory: '#FAF8F5',
              charcoal: '#1A1A1A',
              warmgrey: '#A89F94',
              champagne: '#C9A96E',
              navy: '#1B2A4A',
            }
          }
        }
      }
    </script>
    <style>
      html { height: 100%; }
      body { height: 100%; margin: 0; }

      .font-serif-display { font-family: 'Playfair Display', Georgia, serif; }
      .font-serif-body { font-family: 'Cormorant Garamond', Georgia, serif; }
      .font-sans-body { font-family: 'Montserrat', Arial, sans-serif; }

      .app-root {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        scroll-behavior: smooth;
      }

      /* Animations */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes lineGrow {
        from { height: 0; }
        to { height: 80px; }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideLeft {
        from { opacity: 0; transform: translateX(40px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes subtleFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes dividerGrow {
        from { width: 0; opacity: 0; }
        to { width: 60px; opacity: 1; }
      }

      .anim-fade-up {
        opacity: 0;
        animation: fadeUp 1s ease-out forwards;
      }
      .anim-fade-in {
        opacity: 0;
        animation: fadeIn 1.2s ease-out forwards;
      }
      .anim-line {
        animation: lineGrow 1.2s ease-out 0.5s forwards;
        height: 0;
      }
      .anim-divider {
        animation: dividerGrow 0.8s ease-out forwards;
        width: 0;
      }
      .anim-delay-1 { animation-delay: 0.2s; }
      .anim-delay-2 { animation-delay: 0.4s; }
      .anim-delay-3 { animation-delay: 0.6s; }
      .anim-delay-4 { animation-delay: 0.8s; }
      .anim-delay-5 { animation-delay: 1.0s; }
      .anim-delay-6 { animation-delay: 1.2s; }

      /* Scroll reveal */
      .reveal {
        opacity: 0;
        transform: translateY(24px);
        transition: opacity 0.8s ease, transform 0.8s ease;
      }
      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* Thin divider — animated */
      .thin-divider {
        width: 60px;
        height: 1px;
        background: #C9A96E;
        margin: 0 auto;
        animation: dividerGrow 0.8s ease-out forwards;
      }

      /* Section divider lines with soft styling */
      .section-divider {
        height: 1px;
        background: rgba(168, 159, 148, 0.2);
        animation: subtleFadeIn 1s ease-out;
      }

      /* Gallery grid */
      .gallery-item {
        position: relative;
        overflow: hidden;
        border-radius: 2px;
      }
      .gallery-item .gallery-overlay {
        position: absolute;
        inset: 0;
        background: rgba(27,42,74,0.0);
        transition: background 0.5s ease;
      }
      .gallery-item:hover .gallery-overlay {
        background: rgba(27,42,74,0.2);
      }
      .gallery-svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* Minimalist gallery styling */
      .gallery-item-minimal {
        position: relative;
        background: #FAF8F5;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .gallery-item-minimal svg {
        width: 100%;
        height: 100%;
        display: block;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), filter 0.8s ease;
      }
      .gallery-item-minimal:hover svg {
        transform: scale(1.04);
        filter: brightness(1.08);
      }
      .gallery-item-minimal .gallery-overlay-minimal {
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(201,169,110,0) 0%, rgba(201,169,110,0.02) 50%, rgba(201,169,110,0) 100%);
        opacity: 0;
        transition: opacity 0.6s ease;
      }
      .gallery-item-minimal:hover .gallery-overlay-minimal {
        opacity: 1;
      }
      .gallery-item-minimal:hover {
        transform: translateY(-8px);
        box-shadow: 0 24px 48px rgba(0,0,0,0.1), 0 8px 16px rgba(0,0,0,0.06);
      }

      /* Testimonial */
      .quote-mark {
        font-family: 'Playfair Display', serif;
        font-size: 72px;
        line-height: 1;
        color: #C9A96E;
        opacity: 0.4;
      }

      /* Nav */
      .nav-link {
        position: relative;
        padding-bottom: 2px;
      }
      .nav-link::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 1px;
        background: #C9A96E;
        transition: width 0.3s ease;
      }
      .nav-link:hover::after {
        width: 100%;
      }

      /* Form styling */
      .form-input {
        background: transparent;
        border: none;
        border-bottom: 1px solid #A89F94;
        padding: 12px 0;
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 300;
        color: #1A1A1A;
        outline: none;
        transition: border-color 0.3s ease;
        width: 100%;
      }
      .form-input:focus {
        border-bottom-color: #C9A96E;
      }
      .form-input::placeholder {
        color: #A89F94;
      }

      /* Feature card */
      .feature-card {
        border: 1px solid rgba(168,159,148,0.25);
        transition: border-color 0.4s ease, transform 0.4s ease;
      }
      .feature-card:hover {
        border-color: #C9A96E;
        transform: translateY(-4px);
      }

      /* Luxury Feature Card */
      .luxury-feature-card {
        border: 1px solid rgba(201,169,110,0.15);
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.02);
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }
      .luxury-feature-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(201,169,110,0.05), transparent);
        transition: left 0.8s ease;
      }
      .luxury-feature-card:hover {
        border-color: rgba(201,169,110,0.35);
        box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
        transform: translateY(-6px);
      }
      .luxury-feature-card:hover::before {
        left: 100%;
      }

      /* Smooth scrollbar */
      .app-root::-webkit-scrollbar { width: 6px; }
      .app-root::-webkit-scrollbar-track { background: #FAF8F5; }
      .app-root::-webkit-scrollbar-thumb { background: #C9A96E; border-radius: 3px; }

      /* Mobile nav */
      .mobile-nav {
        position: fixed;
        top: 0;
        right: -100%;
        width: 100%;
        height: 100%;
        background: #FAF8F5;
        z-index: 60;
        transition: right 0.4s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .mobile-nav.open { right: 0; }

      /* Testimonial carousel */
      .testimonial-track {
        display: flex;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
    </style>
    <style>body { box-sizing: border-box; }</style>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  </head>

  <script>
  // Default config
  const defaultConfig = {
    hero_title: 'La Vue',
    hero_subtitle: 'Port Shepstone',
    hero_tagline: 'Where the ocean meets quiet luxury',
    about_heading: 'A Coastal Sanctuary',
    about_text: 'Perched along the KwaZulu-Natal South Coast, La Vue offers a serene escape where dramatic ocean views meet understated elegance. Every detail has been considered to create an atmosphere of calm refinement — from the carefully curated interiors to the uninterrupted panorama of the Indian Ocean.',
    accommodation_heading: 'The Experience',
    contact_heading: 'Begin Your Stay',
    contact_email: 'lavue.portshepstone@gmail.com',
    contact_phone: '+27 76 163 2064',
    background_color: '#FAF8F5',
    surface_color: '#FFFFFF',
    text_color: '#1A1A1A',
    primary_action_color: '#C9A96E',
    secondary_action_color: '#A89F94',
    font_family: 'Playfair Display',
    font_size: 16
  };

  // Element SDK
  if (window.elementSdk) {
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const c = { ...defaultConfig, ...config };

        // Text updates
        document.getElementById('hero-title').textContent = c.hero_title;
        document.getElementById('hero-subtitle').textContent = c.hero_subtitle;
        document.getElementById('hero-tagline').textContent = c.hero_tagline;
        document.getElementById('about-heading').textContent = c.about_heading;
        document.getElementById('about-text').textContent = c.about_text;
        document.getElementById('accommodation-heading').textContent = c.accommodation_heading;
        document.getElementById('contact-heading').textContent = c.contact_heading;
        document.getElementById('contact-email-display').textContent = c.contact_email;
        document.getElementById('contact-phone-display').textContent = c.contact_phone;

        // Colors
        document.getElementById('app-root').style.backgroundColor = c.background_color;
        document.querySelectorAll('.feature-card').forEach(el => el.style.backgroundColor = c.surface_color);
        document.querySelectorAll('.font-serif-display').forEach(el => {
          if (!el.closest('.quote-mark') && !el.closest('footer')) {
            el.style.color = c.text_color;
          }
        });
        document.querySelectorAll('.thin-divider').forEach(el => el.style.backgroundColor = c.primary_action_color);
        document.querySelectorAll('[style*="color: #C9A96E"], [style*="color:#C9A96E"]').forEach(el => {
          if (el.tagName !== 'I') el.style.color = c.primary_action_color;
        });

        // Fonts
        const serifStack = `${c.font_family}, Georgia, serif`;
        document.querySelectorAll('.font-serif-display').forEach(el => el.style.fontFamily = serifStack);

        // Font size
        const base = c.font_size || 16;
        document.querySelectorAll('.font-serif-body').forEach(el => {
          const current = parseFloat(getComputedStyle(el).fontSize);
          if (current > 18) el.style.fontSize = `${base * 1.35}px`;
          else el.style.fontSize = `${base}px`;
        });
      },
      mapToCapabilities: (config) => {
        const c = { ...defaultConfig, ...config };
        return {
          recolorables: [
            { get: () => c.background_color, set: (v) => { c.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
            { get: () => c.surface_color, set: (v) => { c.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => c.text_color, set: (v) => { c.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => c.primary_action_color, set: (v) => { c.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
            { get: () => c.secondary_action_color, set: (v) => { c.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
          ],
          borderables: [],
          fontEditable: {
            get: () => c.font_family,
            set: (v) => { c.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: {
            get: () => c.font_size,
            set: (v) => { c.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
          }
        };
      },
      mapToEditPanelValues: (config) => {
        const c = { ...defaultConfig, ...config };
        return new Map([
          ['hero_title', c.hero_title],
          ['hero_subtitle', c.hero_subtitle],
          ['hero_tagline', c.hero_tagline],
          ['about_heading', c.about_heading],
          ['about_text', c.about_text],
          ['accommodation_heading', c.accommodation_heading],
          ['contact_heading', c.contact_heading],
          ['contact_email', c.contact_email],
          ['contact_phone', c.contact_phone]
        ]);
      }
    });
  }

  // Scroll reveal
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // Mobile nav
  document.getElementById('menu-toggle').addEventListener('click', () => {
    document.getElementById('mobile-nav').classList.add('open');
  });
  document.getElementById('menu-close').addEventListener('click', () => {
    document.getElementById('mobile-nav').classList.remove('open');
  });
  document.querySelectorAll('.mobile-nav-link').forEach(link => {
    link.addEventListener('click', () => {
      document.getElementById('mobile-nav').classList.remove('open');
    });
  });

  // Form
  document.getElementById('contact-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = document.getElementById('submit-btn');
    const originalText = submitBtn.querySelector('span:first-child').innerHTML;
    
    // Show loading state
    submitBtn.disabled = true;
    submitBtn.querySelector('span:first-child').innerHTML = '<i data-lucide="loader" style="width:14px;height:14px;animation:spin 1s linear infinite;"></i> Sending...';
    lucide.createIcons();
    
    const formData = {
      name: document.getElementById('cf-name').value,
      email: document.getElementById('cf-email').value,
      dates: document.getElementById('cf-dates').value,
      message: document.getElementById('cf-message').value
    };
    
    try {
      // Send via Formspree to lavue.portshepstone@gmail.com
      const response = await fetch('https://formspree.io/f/mdokqnpv', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: formData.name,
          email: formData.email,
          dates: formData.dates,
          message: formData.message,
          _replyto: formData.email
        })
      });
      
      if (response.ok) {
        document.getElementById('form-success').classList.remove('hidden');
        e.target.reset();
        setTimeout(() => document.getElementById('form-success').classList.add('hidden'), 4000);
      } else {
        throw new Error('Failed to send');
      }
    } catch (error) {
      console.error('Error sending form:', error);
      // Show error message
      const successDiv = document.getElementById('form-success');
      successDiv.innerHTML = '<div class="flex items-start gap-4"><i data-lucide="alert-circle" style="width:18px;height:18px;color:#C9A96E;flex-shrink:0;margin-top:2px;"></i><div><p class="font-sans-body text-sm font-medium" style="color: #C9A96E; letter-spacing: 0.05em;">Unable to Send</p><p class="font-serif-body text-sm mt-1" style="color: #A89F94; font-weight: 300; line-height: 1.5;">Please try again or contact us directly.</p></div></div>';
      successDiv.classList.remove('hidden');
      lucide.createIcons();
      setTimeout(() => successDiv.classList.add('hidden'), 4000);
    } finally {
      submitBtn.disabled = false;
      submitBtn.querySelector('span:first-child').innerHTML = originalText;
      lucide.createIcons();
    }
  });

  // Submit button hover effect
  const submitBtn = document.getElementById('submit-btn');
  if (submitBtn) {
    submitBtn.addEventListener('mouseenter', function() {
      const bgSpan = this.querySelector('span:last-child');
      bgSpan.style.transform = 'scaleX(1)';
      const textSpan = this.querySelector('span:first-child');
      textSpan.style.color = '#1A1A1A';
      const arrow = textSpan.querySelector('i');
